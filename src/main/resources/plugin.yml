name: CommandHider
main: com.github.alantr7.commandhider.CommandHiderPlugin
version: 1.0.0
description: Manages command permissions and their visibility
folia-supported: true
api-version: '1.21.11'
provides:
  - CommandWhitelist
softdepend:
  - LuckPerms
commands:
  commandhider:
    aliases:
      - ch
    description: Reloads CommandHider
    usage: /<command> reload
  commandwhitelist:
    aliases:
      - cwreload
    description: Legacy CommandWhitelist reload alias
    usage: /<command> reload
permissions:
  commandhider.bypass:
    default: false
    description: Allows players to bypass command restrictions
  commandwhitelist.bypass:
    default: false
    description: Legacy CommandWhitelist bypass permission
  commandhider.reload:
    default: op
    description: Allows reloading CommandHider
  commandwhitelist.cwreload:
    default: op
    description: Legacy CommandWhitelist reload permission
